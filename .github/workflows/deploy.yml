name: Deploy to Vercel

on:
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    environment: production
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Sync Environment Variables to Vercel
        run: |
          declare -A VARS
          VARS[DATABASE_URL]="${{ secrets.DATABASE_URL }}"
          VARS[DIRECT_DATABASE_URL]="${{ secrets.DIRECT_DATABASE_URL }}"
          VARS[NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY]="${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}"
          VARS[CLERK_SECRET_KEY]="${{ secrets.CLERK_SECRET_KEY }}"
          VARS[NEXT_PUBLIC_CLERK_SIGN_IN_URL]="/sign-in"
          VARS[NEXT_PUBLIC_CLERK_SIGN_UP_URL]="/sign-up"

          for KEY in "${!VARS[@]}"; do
            # Remove existing variable (ignore error if not exists)
            echo "${VARS[$KEY]}" | vercel env rm "$KEY" production --yes --token=${{ secrets.VERCEL_TOKEN }} 2>/dev/null || true
            # Add variable
            echo "${VARS[$KEY]}" | vercel env add "$KEY" production --token=${{ secrets.VERCEL_TOKEN }}
          done

      - name: Pull Vercel Environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
